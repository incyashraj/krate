[app]
id = "dev.krate.curl"
name = "krate-curl"
version = "0.1.0-dev"
entry = "target/wasm32-wasip1/release/krate_curl.wasm"
world = "krate:app/cli@0.1.0"

[[capabilities]]
cap = "io.args"
rationale = "Read the URL passed after the app separator"
required = true

[[capabilities]]
cap = "io.stdout"
rationale = "Print the response body"
required = true

[[capabilities]]
cap = "io.stderr"
rationale = "Print usage and network errors"
required = true

[[capabilities]]
cap = "net.connect:127.0.0.1:*"
rationale = "Allow localhost HTTP test servers on dynamic ports"
required = true
