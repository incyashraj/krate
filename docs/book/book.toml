[book]
title = "Krate Documentation"
authors = ["Krate contributors"]
language = "en"
multilingual = false
src = "src"

[output.html]
site-url = "/krate/"
git-repository-url = "https://github.com/incyashraj/krate"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/incyashraj/krate/edit/main/docs/book/{path}"
no-section-label = false
additional-css = []
additional-js = ["mermaid-render.js"]

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 20
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
