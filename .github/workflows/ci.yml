name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      full:
        description: Run full cross-host CI, benchmarks, and dependency audit
        required: false
        type: boolean
        default: false
      language_variants_mode:
        description: Language-variant fixture mode (optional, any, both, go, ts)
        required: false
        type: string
        default: optional

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ──────────────────────────────────────────────
  # 1. Format check
  # ──────────────────────────────────────────────
  fmt:
    name: Format (rustfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ──────────────────────────────────────────────
  # 2. Lint
  # ──────────────────────────────────────────────
  clippy:
    name: Lint (clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: clippy
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ──────────────────────────────────────────────
  # 3. Phase 2 binding checkpoint
  # ──────────────────────────────────────────────
  phase2-bindings:
    name: Phase 2 bindings
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-phase2-bindings-${{ hashFiles('**/Cargo.lock') }}
      - name: Generate and test Phase 2 Rust host bindings
        run: cargo test -p krate-runtime --features phase2-bindings

  # ──────────────────────────────────────────────
  # 4. Fast Linux workspace test
  # ──────────────────────────────────────────────
  quick-test:
    name: Test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32-wasip1, wasm32-wasip2, wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
      - name: Run workspace tests
        run: cargo test --workspace --all-features

  # ──────────────────────────────────────────────
  # 5. Rust SDK package dry-run
  # ──────────────────────────────────────────────
  rust-sdk-package:
    name: Rust SDK package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32-wasip1
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-sdk-package-${{ hashFiles('**/Cargo.lock') }}
      - name: Record Rust SDK evidence
        run: |
          mkdir -p krate-evidence
          scripts/record-phase2-rust-sdk-evidence.sh \
            --strict \
            --output krate-evidence/rust-sdk-evidence.md
      - name: Upload Rust SDK evidence
        uses: actions/upload-artifact@v7
        with:
          name: rust-sdk-evidence
          path: krate-evidence/rust-sdk-evidence.md
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # 6. UAPI contract and generated reference freshness
  # ──────────────────────────────────────────────
  uapi-reference:
    name: UAPI contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-uapi-reference-${{ hashFiles('**/Cargo.lock') }}
      - name: Install wasm-tools
        run: cargo install wasm-tools --locked
      - name: Check Phase 2 UAPI contract
        run: sh scripts/check-uapi.sh
      - name: Check Phase 3 UAPI draft
        run: sh scripts/check-phase3-uapi.sh
      - name: Check Phase 3 design docs
        run: sh scripts/check-phase3-design-docs.sh
      - name: Regenerate UAPI reference
        run: sh scripts/generate-uapi-reference.sh
      - name: Check generated UAPI reference is current
        run: git diff --exit-code -- docs/book/src/reference/uapi/index.md
      - name: Regenerate UAPI freeze evidence
        run: sh scripts/generate-uapi-freeze-evidence.sh
      - name: Check generated UAPI freeze evidence is current
        run: git diff --exit-code -- docs/book/src/phase2/uapi-freeze-evidence.md
      - name: Regenerate UAPI freeze lock
        run: sh scripts/generate-uapi-freeze-lock.sh
      - name: Check generated UAPI freeze lock is current
        run: git diff --exit-code -- docs/book/src/phase2/uapi-freeze-lock.md
      - name: Check runtime adapter boundary
        run: sh scripts/check-adapter-boundary.sh
      - name: Check Phase 2 exit evidence
        run: sh scripts/check-phase2-exit-evidence.sh
      - name: Check Phase 2 UAPI freeze decision packet
        run: sh scripts/check-phase2-freeze-decision.sh
      - name: Check Phase 2 closeout docs
        run: sh scripts/check-phase2-closeout-docs.sh

  # ──────────────────────────────────────────────
  # 7. Shared component fixtures
  # ──────────────────────────────────────────────
  hello-fixture:
    name: Build shared component fixtures
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ubuntu-latest
    outputs:
      sha256: ${{ steps.hash.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32-wasip1, wasm32-wasip2
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-fixture-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-component
        run: cargo install cargo-component --locked --version 0.21.1
      - name: Build hello fixture once
        id: build
        shell: bash
        run: |
          wasm_path="$(scripts/build-hello-component.sh)"
          mkdir -p krate-fixture
          cp "$wasm_path" krate-fixture/hello_world.wasm
      - name: Build Phase 2 smoke fixture once
        shell: bash
        run: |
          wasm_path="$(scripts/build-phase2-smoke-component.sh)"
          cp "$wasm_path" krate-fixture/phase2_smoke.wasm
      - name: Build krate-clock fixture once
        shell: bash
        run: |
          wasm_path="$(scripts/build-krate-clock-component.sh)"
          cp "$wasm_path" krate-fixture/krate_clock.wasm
      - name: Build krate-cat fixture once
        shell: bash
        run: |
          wasm_path="$(scripts/build-krate-cat-component.sh)"
          cp "$wasm_path" krate-fixture/krate_cat.wasm
      - name: Build krate-curl fixture once
        shell: bash
        run: |
          wasm_path="$(scripts/build-krate-curl-component.sh)"
          cp "$wasm_path" krate-fixture/krate_curl.wasm
      - name: Build krate-hello-gui fixture once
        shell: bash
        run: |
          wasm_path="$(scripts/build-krate-hello-gui-component.sh)"
          cp "$wasm_path" krate-fixture/krate_hello_gui.wasm
      - name: Check Phase 2 fixture imports
        shell: bash
        run: |
          scripts/check-component-imports.sh \
            krate-fixture/phase2_smoke.wasm \
            krate-fixture/krate_clock.wasm \
            krate-fixture/krate_cat.wasm \
            krate-fixture/krate_curl.wasm \
            krate-fixture/krate_hello_gui.wasm
      - name: Record fixture hash
        id: hash
        shell: bash
        run: |
          sha256="$(sha256sum krate-fixture/hello_world.wasm | awk '{print $1}')"
          printf '%s\n' "$sha256" > krate-fixture/hello_world.wasm.sha256
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "hello fixture sha256: $sha256"
      - name: Upload component fixtures
        uses: actions/upload-artifact@v7
        with:
          name: phase-component-fixtures
          path: krate-fixture/
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # 8. Full test matrix — Linux, macOS, Windows
  # ──────────────────────────────────────────────
  full-test:
    name: Full test (${{ matrix.os }})
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ${{ matrix.os }}
    needs: hello-fixture
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32-wasip1, wasm32-wasip2, wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build workspace
        run: cargo build --workspace
      - name: Build release binary
        run: cargo build --release --workspace
      - name: Download shared component fixtures
        uses: actions/download-artifact@v8
        with:
          name: phase-component-fixtures
          path: krate-fixture
      - name: Install fixtures at sample manifest entries
        shell: bash
        run: |
          mkdir -p \
            apps/krate-clock/target/wasm32-wasip1/release \
            apps/krate-cat/target/wasm32-wasip1/release \
            apps/krate-curl/target/wasm32-wasip1/release
          cp krate-fixture/krate_clock.wasm \
            apps/krate-clock/target/wasm32-wasip1/release/krate_clock.wasm
          cp krate-fixture/krate_cat.wasm \
            apps/krate-cat/target/wasm32-wasip1/release/krate_cat.wasm
          cp krate-fixture/krate_curl.wasm \
            apps/krate-curl/target/wasm32-wasip1/release/krate_curl.wasm
          mkdir -p apps/krate-hello-gui/target/wasm32-wasip1/release
          cp krate-fixture/krate_hello_gui.wasm \
            apps/krate-hello-gui/target/wasm32-wasip1/release/krate_hello_gui.wasm
      - name: Run Phase 3 GUI component headless on this host
        shell: bash
        run: |
          cargo build -p krate-cli
          bin=target/debug/krate
          if [ "$RUNNER_OS" = "Windows" ]; then
            bin=target/debug/krate.exe
          fi
          set +e
          "$bin" run \
            --auto-grant \
            --manifest apps/krate-hello-gui/manifest.toml \
            apps/krate-hello-gui/target/wasm32-wasip1/release/krate_hello_gui.wasm \
            -- quick
          code=$?
          set -e
          if [ "$code" != "1" ]; then
            echo "expected headless clean exit 1 from the GUI component on $RUNNER_OS, got $code" >&2
            exit 1
          fi
          echo "same GUI artifact ran headless on $RUNNER_OS (clean bounded exit)"
      - name: Run Linux winit native window proof (Xvfb)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update -q
          # xvfb provides the display server; libxkbcommon-x11 is dlopen'd by
          # winit's X11 keyboard path and absent on minimal runners.
          # x11-apps (xwd) + imagemagick capture the drawn window as evidence.
          sudo apt-get install -y -q xvfb libxkbcommon-x11-0 xdotool \
            x11-apps imagemagick
          # 1. Adapter-level native smoke: real winit window round trip.
          KRATE_WINIT_NATIVE_SMOKE=1 KRATE_WINIT_ANY_THREAD=1 xvfb-run -a \
            cargo test -p krate-adapter-linux --lib -- --ignored \
            winit_prototype_native_window_smoke
          # 2. The slice's definition of done: the portable hello-gui
          #    component opens a real window on a Linux host.
          set +e
          xvfb-run -a target/debug/krate run \
            --auto-grant \
            --native-window \
            --manifest apps/krate-hello-gui/manifest.toml \
            apps/krate-hello-gui/target/wasm32-wasip1/release/krate_hello_gui.wasm \
            -- quick
          code=$?
          set -e
          if [ "$code" != "1" ]; then
            echo "expected clean bounded exit 1 from the native Linux window run, got $code" >&2
            exit 1
          fi
          echo "hello-gui opened a real winit window on Linux (Xvfb) and exited cleanly"
          # 3. Synthetic click round trip: xdotool presses the drawn button
          #    and the component must observe it (exit 0).
          set +e
          KRATE_XVFB_SCREENSHOT="$RUNNER_TEMP/hello-gui-linux.png" \
          KRATE_EXPECT_TYPED="hi krate" \
            xvfb-run -a bash scripts/xvfb-click-hello-gui.sh
          code=$?
          set -e
          if [ "$code" != "0" ]; then
            echo "expected exit 0 from the synthetic input round trip, got $code" >&2
            exit 1
          fi
          echo "synthetic typing + click reached the component on Linux (exit 0, typed text echoed)"
      - name: Upload Linux drawn-window screenshot
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: hello-gui-linux-screenshot
          path: ${{ runner.temp }}/hello-gui-linux.png
          if-no-files-found: ignore
          retention-days: 14
      - name: Run Windows winit native window proof
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          # 1. Adapter-level native smoke: real winit window round trip.
          KRATE_WINIT_NATIVE_SMOKE=1 KRATE_WINIT_ANY_THREAD=1 \
            cargo test -p krate-adapter-windows --lib -- --ignored \
            winit_prototype_native_window_smoke
          # 2. The portable hello-gui component opens a real window on a
          #    Windows host.
          set +e
          target/debug/krate.exe run \
            --auto-grant \
            --native-window \
            --manifest apps/krate-hello-gui/manifest.toml \
            apps/krate-hello-gui/target/wasm32-wasip1/release/krate_hello_gui.wasm \
            -- quick
          code=$?
          set -e
          if [ "$code" != "1" ]; then
            echo "expected clean bounded exit 1 from the native Windows window run, got $code" >&2
            exit 1
          fi
          echo "hello-gui opened a real winit window on Windows and exited cleanly"
      - name: Run Phase 1 tests
        shell: bash
        env:
          KRATE_HELLO_WASM: krate-fixture/hello_world.wasm
          KRATE_HELLO_SHA256: ${{ needs.hello-fixture.outputs.sha256 }}
          KRATE_PHASE2_SMOKE_WASM: krate-fixture/phase2_smoke.wasm
          KRATE_CLOCK_WASM: apps/krate-clock/target/wasm32-wasip1/release/krate_clock.wasm
          KRATE_CAT_WASM: apps/krate-cat/target/wasm32-wasip1/release/krate_cat.wasm
          KRATE_CURL_WASM: apps/krate-curl/target/wasm32-wasip1/release/krate_curl.wasm
        run: scripts/test-phase1.sh
      - name: Set up Node.js for TypeScript fixture lane
        uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Build Phase 2 language-variant fixtures
        shell: bash
        env:
          KRATE_LANGUAGE_VARIANTS_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.language_variants_mode || 'ts' }}
          KRATE_ALLOW_NPX_INSTALL: "1"
        run: scripts/build-phase2-language-variant-fixtures.sh
      - name: Run Phase 2 language-variant runtime tests
        shell: bash
        env:
          KRATE_LANGUAGE_VARIANTS_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.language_variants_mode || 'ts' }}
        run: scripts/test-phase2-language-variants.sh
      - name: Record Phase 2 language-variant evidence
        shell: bash
        env:
          KRATE_LANGUAGE_VARIANTS_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.language_variants_mode || 'ts' }}
        run: |
          mkdir -p krate-evidence
          scripts/record-phase2-language-variant-evidence.sh \
            --mode "${KRATE_LANGUAGE_VARIANTS_MODE}" \
            --strict \
            --output "krate-evidence/language-variant-${{ matrix.os }}.md"
      - name: Upload language-variant evidence
        uses: actions/upload-artifact@v7
        with:
          name: language-variant-evidence-${{ matrix.os }}
          path: krate-evidence/language-variant-${{ matrix.os }}.md
          if-no-files-found: error
      - name: Record Phase 2 UCap enforcement evidence
        shell: bash
        run: |
          mkdir -p krate-evidence
          scripts/record-phase2-ucap-evidence.sh \
            --strict \
            --output "krate-evidence/ucap-enforcement-${{ matrix.os }}.md"
      - name: Upload UCap enforcement evidence
        uses: actions/upload-artifact@v7
        with:
          name: ucap-enforcement-evidence-${{ matrix.os }}
          path: krate-evidence/ucap-enforcement-${{ matrix.os }}.md
          if-no-files-found: error
      - name: Record Phase 2 adapter evidence
        shell: bash
        run: |
          mkdir -p krate-evidence
          scripts/record-phase2-adapter-evidence.sh \
            --strict \
            --output "krate-evidence/adapter-evidence-${{ matrix.os }}.md"
      - name: Upload adapter evidence
        uses: actions/upload-artifact@v7
        with:
          name: adapter-evidence-${{ matrix.os }}
          path: krate-evidence/adapter-evidence-${{ matrix.os }}.md
          if-no-files-found: error
      - name: Record Phase 2 sample evidence
        shell: bash
        run: |
          mkdir -p krate-evidence
          scripts/record-phase2-sample-evidence.sh \
            "krate-evidence/sample-evidence-${{ matrix.os }}.md"
      - name: Upload sample evidence
        uses: actions/upload-artifact@v7
        with:
          name: sample-evidence-${{ matrix.os }}
          path: krate-evidence/sample-evidence-${{ matrix.os }}.md
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # 9. Compare language-variant evidence across hosts
  # ──────────────────────────────────────────────
  language-variant-evidence-compare:
    name: Language variant evidence compare
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ubuntu-latest
    needs: full-test
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
      - name: Download Linux language-variant evidence
        uses: actions/download-artifact@v8
        with:
          name: language-variant-evidence-ubuntu-latest
          path: krate-evidence/linux
      - name: Download macOS language-variant evidence
        uses: actions/download-artifact@v8
        with:
          name: language-variant-evidence-macos-latest
          path: krate-evidence/macos
      - name: Download Windows language-variant evidence
        uses: actions/download-artifact@v8
        with:
          name: language-variant-evidence-windows-latest
          path: krate-evidence/windows
      - name: Compare language-variant evidence reports
        shell: bash
        run: |
          scripts/compare-phase2-language-variant-evidence.sh \
            krate-evidence/linux/language-variant-ubuntu-latest.md \
            krate-evidence/macos/language-variant-macos-latest.md \
            krate-evidence/windows/language-variant-windows-latest.md

  # ──────────────────────────────────────────────
  # 10. Compare UCap enforcement evidence across hosts
  # ──────────────────────────────────────────────
  ucap-enforcement-evidence-compare:
    name: UCap enforcement evidence compare
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ubuntu-latest
    needs: full-test
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
      - name: Download Linux UCap evidence
        uses: actions/download-artifact@v8
        with:
          name: ucap-enforcement-evidence-ubuntu-latest
          path: krate-evidence/linux
      - name: Download macOS UCap evidence
        uses: actions/download-artifact@v8
        with:
          name: ucap-enforcement-evidence-macos-latest
          path: krate-evidence/macos
      - name: Download Windows UCap evidence
        uses: actions/download-artifact@v8
        with:
          name: ucap-enforcement-evidence-windows-latest
          path: krate-evidence/windows
      - name: Compare UCap enforcement evidence reports
        shell: bash
        run: |
          scripts/compare-phase2-ucap-evidence.sh \
            krate-evidence/linux/ucap-enforcement-ubuntu-latest.md \
            krate-evidence/macos/ucap-enforcement-macos-latest.md \
            krate-evidence/windows/ucap-enforcement-windows-latest.md

  # ──────────────────────────────────────────────
  # 11. Compare adapter evidence across hosts
  # ──────────────────────────────────────────────
  adapter-evidence-compare:
    name: Adapter evidence compare
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ubuntu-latest
    needs: full-test
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
      - name: Download Linux adapter evidence
        uses: actions/download-artifact@v8
        with:
          name: adapter-evidence-ubuntu-latest
          path: krate-evidence/linux
      - name: Download macOS adapter evidence
        uses: actions/download-artifact@v8
        with:
          name: adapter-evidence-macos-latest
          path: krate-evidence/macos
      - name: Download Windows adapter evidence
        uses: actions/download-artifact@v8
        with:
          name: adapter-evidence-windows-latest
          path: krate-evidence/windows
      - name: Compare adapter evidence reports
        shell: bash
        run: |
          scripts/compare-phase2-adapter-evidence.sh \
            krate-evidence/linux/adapter-evidence-ubuntu-latest.md \
            krate-evidence/macos/adapter-evidence-macos-latest.md \
            krate-evidence/windows/adapter-evidence-windows-latest.md

  # ──────────────────────────────────────────────
  # 12. Compare sample evidence across hosts
  # ──────────────────────────────────────────────
  sample-evidence-compare:
    name: Sample evidence compare
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ubuntu-latest
    needs: full-test
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
      - name: Download Linux sample evidence
        uses: actions/download-artifact@v8
        with:
          name: sample-evidence-ubuntu-latest
          path: krate-evidence/linux
      - name: Download macOS sample evidence
        uses: actions/download-artifact@v8
        with:
          name: sample-evidence-macos-latest
          path: krate-evidence/macos
      - name: Download Windows sample evidence
        uses: actions/download-artifact@v8
        with:
          name: sample-evidence-windows-latest
          path: krate-evidence/windows
      - name: Compare sample evidence reports
        shell: bash
        run: |
          scripts/compare-phase2-sample-evidence.sh \
            krate-evidence/linux/sample-evidence-ubuntu-latest.md \
            krate-evidence/macos/sample-evidence-macos-latest.md \
            krate-evidence/windows/sample-evidence-windows-latest.md \
            --allow-blocked-curl

  # ──────────────────────────────────────────────
  # 13. Documentation build
  # ──────────────────────────────────────────────
  docs:
    name: Docs (mdBook)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install mdBook
        run: |
          mkdir -p ~/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --directory ~/bin
          echo "$HOME/bin" >> $GITHUB_PATH
      - name: Build docs
        run: mdbook build docs/book
      - name: Check TypeScript SDK shape
        run: npm --prefix packages/sdk-ts run check:shape
      - name: Check Go SDK shape
        run: node packages/sdk-go/scripts/check-shape.mjs

  # ──────────────────────────────────────────────
  # 14. Benchmark smoke + warning-only regression check
  # ──────────────────────────────────────────────
  benchmarks:
    name: Benchmarks (Phase 2 baseline, warning only)
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32-wasip1, wasm32-wasip2
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-component
        run: cargo install cargo-component --locked --version 0.21.1
      - name: Build Phase 1 benchmark components
        shell: bash
        run: scripts/build-phase1-components.sh
      - name: Build Phase 2 benchmark components
        shell: bash
        run: |
          scripts/build-phase2-smoke-component.sh
          scripts/build-krate-clock-component.sh
      - name: Run runtime startup benchmarks
        run: cargo bench -p krate-runtime --bench startup
      - name: Run Phase 2 UAPI dispatch benchmarks
        run: cargo bench -p krate-runtime --bench uapi_dispatch
      - name: Check against recorded baseline
        if: always()
        env:
          BENCH_BASELINE_FILES: ${{ github.workspace }}/docs/book/src/phase2/benchmark-baseline.json
          BENCH_REGRESSION_MODE: warn
          BENCH_REGRESSION_THRESHOLD_PCT: "10"
        run: scripts/check-benchmark-regression.sh

  # ──────────────────────────────────────────────
  # 15. Dependency audit (cargo-deny)
  # ──────────────────────────────────────────────
  deny:
    name: Dependency audit (cargo-deny)
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.19.4
      - name: Run cargo-deny
        run: scripts/check-dependencies.sh
