name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/book/**"
      - "docs/landing/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install mdBook
        run: |
          mkdir -p ~/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --directory ~/bin
          echo "$HOME/bin" >> $GITHUB_PATH
      - name: Build docs
        run: mdbook build docs/book
      - name: Assemble site — landing page at root, docs under /docs/
        run: |
          # The published site root is the landing page; the mdBook lives at
          # /docs/ (its site-url is set to /krate/docs/ to match). Assemble both
          # into one directory to upload.
          rm -rf _site
          mkdir -p _site
          cp docs/landing/index.html _site/index.html
          cp -R docs/book/book _site/docs
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      # GitHub's Pages backend intermittently fails deployments server-side
      # ("Deployment failed, try again later") — observed three times on
      # 2026-07-03 with an identical artifact succeeding in between. Wait and
      # retry once before failing the workflow.
      - name: Wait before retrying a flaky Pages deployment
        if: ${{ steps.deployment.outcome == 'failure' }}
        run: sleep 90
      - name: Retry Pages deployment
        id: deployment_retry
        if: ${{ steps.deployment.outcome == 'failure' }}
        uses: actions/deploy-pages@v4
